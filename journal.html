<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA 6-Day Mastery Study Journal</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #070913;
      --bg-card: rgba(13, 17, 33, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      
      /* Theme colors Two Pointers (Cyan/Teal) */
      --tp-primary: #0ea5e9;
      --tp-glow: rgba(14, 165, 233, 0.15);
      --tp-gradient: linear-gradient(135deg, #0ea5e9 0%, #14b8a6 100%);
      
      /* Theme colors Sliding Window (Orange/Amber) */
      --sw-primary: #f97316;
      --sw-glow: rgba(249, 115, 22, 0.15);
      --sw-gradient: linear-gradient(135deg, #f97316 0%, #eab308 100%);

      /* Utility colors */
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Layout & Utilities */
    .app-container {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 70px);
    }

    header {
      height: 70px;
      background: rgba(13, 17, 33, 0.85);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      background: linear-gradient(135deg, #0ea5e9, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      border: 1px solid var(--border-color);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: 320px;
      background: rgba(8, 11, 22, 0.6);
      border-right: 1px solid var(--border-color);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .day-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .day-card::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: transparent;
      transition: all 0.3s ease;
    }

    .day-card.active-two-pointer {
      background: rgba(14, 165, 233, 0.06);
      border-color: rgba(14, 165, 233, 0.3);
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.08);
    }

    .day-card.active-two-pointer::after {
      background: var(--tp-primary);
    }

    .day-card.active-sliding-window {
      background: rgba(249, 115, 22, 0.06);
      border-color: rgba(249, 115, 22, 0.3);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.08);
    }

    .day-card.active-sliding-window::after {
      background: var(--sw-primary);
    }

    .day-card:hover:not(.active-two-pointer):not(.active-sliding-window) {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
    }

    .day-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .day-num {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .day-num.tp { color: var(--tp-primary); }
    .day-num.sw { color: var(--sw-primary); }

    .day-name {
      font-size: 14px;
      font-weight: 700;
    }

    .day-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    .day-status {
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
    }

    .day-status.completed {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
      color: var(--success);
    }

    /* Main Workspace */
    .workspace {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
      margin-bottom: 12px;
    }

    .dashboard-title-area h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .dashboard-title-area p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .overall-stats {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .progress-bar-container {
      width: 200px;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--tp-primary) 0%, var(--sw-primary) 100%);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ROI Card Highlights */
    .roi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .roi-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .roi-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .roi-icon-container {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .roi-icon-container.tp {
      background: rgba(14, 165, 233, 0.1);
      color: var(--tp-primary);
      border: 1px solid rgba(14, 165, 233, 0.2);
    }

    .roi-icon-container.sw {
      background: rgba(249, 115, 22, 0.1);
      color: var(--sw-primary);
      border: 1px solid rgba(249, 115, 22, 0.2);
    }

    .roi-content h3 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .roi-content p {
      font-size: 16px;
      font-weight: 700;
    }

    /* Study Panel for Day 1 & 4 */
    .learn-panel {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .two-pass-selector {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      align-self: flex-start;
      margin-bottom: 12px;
    }

    .pass-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .pass-btn.active.tp {
      background: var(--tp-primary);
      color: white;
    }

    .pass-btn.active.sw {
      background: var(--sw-primary);
      color: white;
    }

    /* Mock Code Editor */
    .editor-wrapper {
      background: #090b11;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .editor-header {
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-dots {
      display: flex;
      gap: 6px;
    }

    .editor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27c93f; }

    .editor-title {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-body {
      padding: 24px;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow-x: auto;
      position: relative;
    }

    .code-line {
      display: flex;
      gap: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    .code-line.highlighted {
      background: rgba(14, 165, 233, 0.12);
      border-left: 2px solid var(--tp-primary);
    }

    .code-line.highlighted-sw {
      background: rgba(249, 115, 22, 0.12);
      border-left: 2px solid var(--sw-primary);
    }

    .line-number {
      color: rgba(255, 255, 255, 0.25);
      width: 24px;
      text-align: right;
      user-select: none;
    }

    .code-content {
      white-space: pre;
    }

    .step-explain-box {
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      min-height: 80px;
    }

    .step-explain-box i {
      font-size: 20px;
      margin-top: 2px;
    }

    .step-explain-box.tp i { color: var(--tp-primary); }
    .step-explain-box.sw i { color: var(--sw-primary); }

    /* Interactive Building Sandbox */
    .sandbox-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sandbox-instruction {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .sandbox-steps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .sandbox-step-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sandbox-step-card h4 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sandbox-step-card.tp h4 { color: var(--tp-primary); }
    .sandbox-step-card.sw h4 { color: var(--sw-primary); }

    .sandbox-select {
      background: #090b11;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      width: 100%;
    }

    .sandbox-select:focus {
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Dry Run Visualizer (Day 2 & 5) */
    .problem-tabs {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1px;
      margin-bottom: 24px;
    }

    .prob-tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 10px 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .prob-tab::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: transparent;
      transition: all 0.2s ease;
    }

    .prob-tab.active.tp {
      color: var(--tp-primary);
    }
    .prob-tab.active.tp::after {
      background: var(--tp-primary);
    }

    .prob-tab.active.sw {
      color: var(--sw-primary);
    }
    .prob-tab.active.sw::after {
      background: var(--sw-primary);
    }

    .dry-run-workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    @media (max-width: 1024px) {
      .dry-run-workspace {
        grid-template-columns: 1fr;
      }
    }

    /* Visual Simulation Area */
    .simulation-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      justify-content: space-between;
    }

    .sim-array-container {
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
      margin: 20px 0;
    }

    .array-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      position: relative;
      padding: 12px 0;
    }

    .array-cell {
      width: 56px;
      height: 56px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      position: relative;
      transition: all 0.3s ease;
    }

    .array-cell.active-left {
      border-color: var(--tp-primary);
      background: rgba(14, 165, 233, 0.1);
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
    }

    .array-cell.active-right {
      border-color: var(--warning);
      background: rgba(245, 158, 11, 0.1);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
    }

    .array-cell.active-left-sw {
      border-color: var(--sw-primary);
      background: rgba(249, 115, 22, 0.1);
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
    }

    .array-cell.in-window {
      background: rgba(249, 115, 22, 0.12);
      border-color: var(--sw-primary);
    }

    .array-index {
      position: absolute;
      top: -20px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Fira Code', monospace;
    }

    .cell-pointer {
      position: absolute;
      bottom: -24px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      animation: bounce 1.5s infinite;
    }

    .cell-pointer i {
      font-size: 12px;
    }

    .cell-pointer.lp { color: var(--tp-primary); }
    .cell-pointer.rp { color: var(--warning); }
    .cell-pointer.sw-lp { color: var(--text-main); }
    .cell-pointer.sw-rp { color: var(--sw-primary); }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .vars-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      background: rgba(0, 0, 0, 0.4);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    .var-badge {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
    }

    .var-name {
      color: var(--text-muted);
      font-family: 'Fira Code', monospace;
    }

    .var-value {
      font-weight: 700;
      font-family: 'Fira Code', monospace;
    }

    /* Simulation Controls */
    .sim-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .sim-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .sim-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .sim-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .step-indicator {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--text-muted);
      min-width: 90px;
      text-align: center;
    }

    /* Quiz Panel styles */
    .quiz-panel {
      margin-top: 24px;
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
    }

    .quiz-question-box {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .quiz-question {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-option {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .quiz-option:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .quiz-option.selected {
      border-color: var(--tp-primary);
      background: rgba(14, 165, 233, 0.05);
    }

    .quiz-option.selected.sw {
      border-color: var(--sw-primary);
      background: rgba(249, 115, 22, 0.05);
    }

    .quiz-option.correct {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.08);
    }

    .quiz-option.incorrect {
      border-color: var(--error);
      background: rgba(239, 68, 68, 0.08);
    }

    .quiz-feedback {
      margin-top: 12px;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.02);
    }

    /* Active Recall Skeletons (Day 3 & 6) */
    .skeleton-input {
      background: #1e293b;
      border: 1px dashed rgba(255, 255, 255, 0.3);
      color: #38bdf8;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      padding: 1px 6px;
      border-radius: 4px;
      outline: none;
      width: 130px;
      transition: all 0.2s ease;
      vertical-align: middle;
      text-align: center;
    }

    .skeleton-input:focus {
      border: 1px solid var(--tp-primary);
      background: #0f172a;
      box-shadow: 0 0 8px rgba(14, 165, 233, 0.3);
    }

    .skeleton-input.correct {
      border: 1px solid var(--success) !important;
      color: #34d399 !important;
      background: rgba(16, 185, 129, 0.15) !important;
      font-weight: 700;
    }

    .skeleton-input.incorrect {
      border: 1px solid var(--error) !important;
      color: #f87171 !important;
      background: rgba(239, 68, 68, 0.15) !important;
    }

    .skeleton-controls {
      display: flex;
      gap: 16px;

      font-weight: 700;

    // ==========================================
    // COMPONENT: DAY 1 & 4 (PATTERN LEARN 2X)
    // ==========================================
    function DayPatternLearn({ dayData, onComplete, isCompleted, onBack }) {
      const [activePass, setActivePass] = useState(1); // 1 = Trace study, 2 = Reconstruction
      const [highlightedLine, setHighlightedLine] = useState(null);
      const [sandboxAnswers, setSandboxAnswers] = useState({ 0: "", 1: "", 2: "" });
      const [sandboxErrors, setSandboxErrors] = useState({});
      const [sandboxCorrect, setSandboxCorrect] = useState(false);

      const handleLineClick = (lineNum) => {
        const step = dayData.template.traceSteps.find(s => s.line === lineNum);
        if (step) {
          setHighlightedLine(lineNum);
        }
      };

      const handleSandboxChange = (index, val) => {
        setSandboxAnswers({ ...sandboxAnswers, [index]: val });
      };

      const verifySandbox = () => {
        let errors = {};
        let isAllCorrect = true;
        dayData.template.sandbox.forEach((q, idx) => {
          if (parseInt(sandboxAnswers[idx]) !== q.correct) {
            errors[idx] = true;
            isAllCorrect = false;
          }
        });
        setSandboxErrors(errors);
        setSandboxCorrect(isAllCorrect);
      };

      const activeStepExplain = dayData.template.traceSteps.find(s => s.line === highlightedLine);

      return (
        <div>
          <a href="#" className="back-dashboard-btn" onClick={(e) => { e.preventDefault(); onBack(); }}>
            <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
          </a>

          <div className="card">
            <div className="dashboard-header" style={{ border: 'none', marginBottom: '0', paddingBottom: '0' }}>
              <div className="dashboard-title-area">
                <span style={{ fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', color: dayData.patternType === 'tp' ? 'var(--tp-primary)' : 'var(--sw-primary)' }}>
                  Day {dayData.id} Curriculum — {dayData.category}
                </span>
                <h1 style={{ marginTop: '4px' }}>{dayData.title}</h1>

            {/* ROI statistics cards */}

                <div className={`roi-icon-container ${dayData.patternType}`}>
                  <i className="fa-solid fa-gauge-high"></i>

                <div className="roi-content">
                  <h3>Complexity Bounds</h3>
                  <p>{dayData.roi.complexity}</p>

              <button

                  <div className="editor-body">

                      <div key={idx} className={`sandbox-step-card ${dayData.patternType}`} style={{ borderColor: hasErr ? 'var(--error)' : 'var(--border-color)' }}>
                        <h4 style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px' }}>Step {idx + 1} — {item.step}</h4>
                        <p style={{ fontSize: '13px', minHeight: '38px' }}>{item.question}</p>
                        <select 
                          className="sandbox-select" 
                          value={sandboxAnswers[idx]} 
                          onChange={(e) => handleSandboxChange(idx, e.target.value)}
                        >
                          <option value="">-- Choose Code Line --</option>
                          {item.options.map((opt, oIdx) => (
                            <option key={oIdx} value={oIdx}>{opt}</option>

            <div className="day-complete-section">
              <div style={{ color: 'var(--text-muted)', fontSize: '13px' }}>

                <i className="fa-solid fa-graduation-cap"></i> Mark Day {dayData.id} Complete
              </button>
            </div>
          </div>
        </div>
      );
    }

      const trace = activeProb.steps[stepIdx];

      // Reset step index when problem changes
      useEffect(() => {
        setStepIdx(0);
      }, [activeTab]);

      const handleQuizSelect = (qIdx, optIdx) => {
        if (quizChecked) return;
        setSelectedQuizOpts({ ...selectedQuizOpts, [qIdx]: optIdx });
      };

      const handleVerifyQuiz = () => {
        setQuizChecked(true);
      };

      // Check if all quiz questions are answered correctly
      const isQuizPassed = () => {
        let passed = true;
        dayData.quiz.forEach((q, idx) => {
          if (selectedQuizOpts[idx] !== q.correct) passed = false;
        });
        return passed;

      return (

                  {dayData.problems[key].title}

              ))}

              <div className="story-text">

                        if (trace.left === idx) cellClass = "active-left";
                        else if (trace.right === idx) cellClass = "active-right";

                      if (dayData.patternType === 'sw') {
                        const inWin = idx >= trace.leftIdx && idx <= trace.rightIdx;
                        if (inWin) {
                          cellClass = "in-window";

            {/* Pattern Recognition Quiz Section */}
            <div className="quiz-panel">
              <h3 style={{ fontSize: '16px', fontWeight: '800', marginBottom: '16px', display: 'flex', alignLines: 'center', gap: '8px' }}>
                <i className="fa-solid fa-clipboard-question" style={{ color: dayData.patternType === 'tp' ? 'var(--tp-primary)' : 'var(--sw-primary)' }}></i> Active Recall Pitfall Quiz
              </h3>

              {dayData.quiz.map((item, qIdx) => {
                return (
                  <div key={qIdx} className="quiz-question-box">
                    <div className="quiz-question">
                      <span style={{ color: 'var(--text-muted)' }}>Q{qIdx + 1}.</span>
                      <span>{item.q}</span>
                    </div>

                    <div className="quiz-options">
                      {item.options.map((opt, optIdx) => {
                        const isSelected = selectedQuizOpts[qIdx] === optIdx;
                        let optionClass = "";
                        
                        if (isSelected) {
                          optionClass = `selected ${dayData.patternType}`;
                        }
                        if (quizChecked) {
                          if (optIdx === item.correct) {
                            optionClass = "correct";
                          } else if (isSelected) {
                            optionClass = "incorrect";
                          }
                        }

                        return (
                          <div 
                            key={optIdx} 
                            className={`quiz-option ${optionClass}`}
                            onClick={() => handleQuizSelect(qIdx, optIdx)}
                          >
                            <span>{opt}</span>
                            {quizChecked && optIdx === item.correct && <i className="fa-solid fa-circle-check" style={{ color: 'var(--success)' }}></i>}
                            {quizChecked && isSelected && optIdx !== item.correct && <i className="fa-solid fa-circle-xmark" style={{ color: 'var(--error)' }}></i>}
                          </div>
                        );
                      })}
                    </div>

                    {quizChecked && isSelected && (
                      <div className="quiz-feedback">
                        <strong>Explanation:</strong> {item.explain}
                      </div>
                    )}
                  </div>
                );
              })}

              <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                <button 
                  className={`primary-action-btn ${dayData.patternType}`}
                  onClick={handleVerifyQuiz}
                  disabled={quizChecked || Object.keys(selectedQuizOpts).length < dayData.quiz.length}
                >
                  Verify Quiz Answers
                </button>
                {quizChecked && (
                  <span style={{ color: isQuizPassed() ? 'var(--success)' : 'var(--warning)', fontWeight: '700', fontSize: '14px' }}>
                    {isQuizPassed() ? "🎉 All answers correct! Day cleared." : "⚠️ Some answers were incorrect. Review explanations."}
                  </span>
                )}
              </div>
            </div>

            {/* Mark completed */}
            <div className="day-complete-section">
              <div style={{ color: 'var(--text-muted)', fontSize: '13px' }}>
                {!quizChecked ? "💡 Complete the Recall Quiz below to unlock day completion." : ""}
              </div>
              <button 
                className="day-complete-btn" 
                onClick={onComplete}
                disabled={!isCompleted && !quizChecked}
              >
                <i className="fa-solid fa-graduation-cap"></i> Mark Day {dayData.id} Complete
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // COMPONENT: DAY 3 & 6 (ACTIVE RECALL BLANKS)
    // ==========================================
    function DayActiveRecall({ dayData, onComplete, isCompleted, onBack }) {
      const pKeys = Object.keys(dayData.problems);
      const [activeTab, setActiveTab] = useState(pKeys[0]);
      
      // Store user inputs for each problem
      const [inputs, setInputs] = useState({});
      const [validation, setValidation] = useState({}); // { [probKey]: { [idx]: 'correct'|'incorrect' } }
      const [checked, setChecked] = useState({}); // { [probKey]: boolean }
      const [showHints, setShowHints] = useState({}); // { [probKey]: boolean }

      const activeProb = dayData.problems[activeTab];

      // Parse template strings into segments with [[answers]]
      // e.g. "int left = [[0]], right = [[nums.length - 1]];" -> segments and answer keys
      const parsedTemplate = activeProb.template.map(line => {
        const regex = /\[\[(.*?)\]\]/g;
        let match;
        const segments = [];
        let lastIndex = 0;
        
        while ((match = regex.exec(line)) !== null) {
          const textBefore = line.substring(lastIndex, match.index);
          const answer = match[1];
          segments.push({ type: 'text', value: textBefore });
          segments.push({ type: 'input', expected: answer });
          lastIndex = regex.lastIndex;
        }
        
        segments.push({ type: 'text', value: line.substring(lastIndex) });
        return segments;
      });

      // Count total inputs across this template
      let inputCounter = 0;
      parsedTemplate.forEach(line => {
        line.forEach(seg => {
          if (seg.type === 'input') {
            seg.inputIdx = inputCounter++;
          }
        });
      });

      const handleInputChange = (idx, value) => {
        setInputs({
          ...inputs,
          [activeTab]: {
            ...inputs[activeTab],
            [idx]: value
          }
        });
      };

      const handleVerifyAnswers = () => {
        const currentInputs = inputs[activeTab] || {};
        const results = {};
        let allCorrect = true;
        
        let counter = 0;
        parsedTemplate.forEach(line => {
          line.forEach(seg => {
            if (seg.type === 'input') {
              const userVal = (currentInputs[counter] || "").trim().replace(/\s+/g, "");
              const expectedVal = seg.expected.trim().replace(/\s+/g, "");
              
              // Simple check: strip whitespace and ignore casing
              const isMatch = userVal.toLowerCase() === expectedVal.toLowerCase() ||
                              (expectedVal === "nums.length-1" && userVal === "nums.length-1") ||
                              (expectedVal === "nums.length-2" && userVal === "nums.length-2");
              
              results[counter] = isMatch ? 'correct' : 'incorrect';
              if (!isMatch) allCorrect = false;
              
              counter++;
            }
          });
        });

        setValidation({ ...validation, [activeTab]: results });
        setChecked({ ...checked, [activeTab]: true });
      };

      const handleRevealSolution = () => {
        const solutionInputs = {};
        let counter = 0;
        parsedTemplate.forEach(line => {
          line.forEach(seg => {
            if (seg.type === 'input') {
              solutionInputs[counter] = seg.expected;
              counter++;
            }
          });
        });
        
        setInputs({
          ...inputs,
          [activeTab]: solutionInputs
        });
        
        const results = {};
        for (let i = 0; i < counter; i++) {
          results[i] = 'correct';
        }
        
        setValidation({ ...validation, [activeTab]: results });
        setChecked({ ...checked, [activeTab]: true });
      };

      // Check if all problems on this day are validated as correct
      const isDayFullyValid = () => {
        let fullyValid = true;
        pKeys.forEach(probKey => {
          const prob = dayData.problems[probKey];
          const valStates = validation[probKey] || {};
          
          // Get total input count for this problem
          let probInputsCount = 0;
          prob.template.forEach(line => {
            const matches = line.match(/\[\[(.*?)\]\]/g);
            if (matches) probInputsCount += matches.length;
          });

          // Check if we have that many correct states
          let correctCount = 0;
          for (let i = 0; i < probInputsCount; i++) {
            if (valStates[i] === 'correct') correctCount++;
          }
          if (correctCount !== probInputsCount) fullyValid = false;
        });
        return fullyValid;
      };

      const activeProbInputs = inputs[activeTab] || {};
      const activeProbValidation = validation[activeTab] || {};
      const isActiveProbChecked = checked[activeTab] || false;

      return (
        <div>
          <a href="#" className="back-dashboard-btn" onClick={(e) => { e.preventDefault(); onBack(); }}>
            <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
          </a>

          <div className="card">
            <div className="dashboard-header" style={{ border: 'none', marginBottom: '0', paddingBottom: '16px' }}>
              <div className="dashboard-title-area">
                <span style={{ fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', color: dayData.patternType === 'tp' ? 'var(--tp-primary)' : 'var(--sw-primary)' }}>
                  Day {dayData.id} Curriculum — Active Recall Skeletons
                </span>
                <h1 style={{ marginTop: '4px' }}>{dayData.title}</h1>
              </div>
            </div>

            {/* Problem Tabs */}
            <div className="problem-tabs">
              {pKeys.map(key => (
                <button 
                  key={key} 
                  className={`prob-tab ${activeTab === key ? `active ${dayData.patternType}` : ''}`}
                  onClick={() => setActiveTab(key)}
                >
                  {dayData.problems[key].title}
                </button>
              ))}
            </div>

            {/* Mental Story Banner */}
            <div className={`story-banner ${dayData.patternType}`}>
              <i className="fa-solid fa-brain"></i>
              <div className="story-text">
                <h4>Active Recall Story Prompt</h4>
                <p>"{activeProb.story}"</p>
              </div>
            </div>

            {/* Interactive Code Editor with Blanks */}
            <div className="editor-wrapper">
              <div className="editor-header">
                <div className="editor-dots">
                  <div className="editor-dot dot-red"></div>
                  <div className="editor-dot dot-yellow"></div>
                  <div className="editor-dot dot-green"></div>
                </div>
                <div className="editor-title">{activeProb.title.split(" — ")[0]}.java</div>
                <div>
                  <span style={{ fontSize: '10px', color: '#ffb020', background: 'rgba(255, 176, 32, 0.15)', padding: '2px 6px', borderRadius: '4px', fontWeight: '700' }}>
                    Active Recall Skeleton
                  </span>
                </div>
              </div>

              <div className="editor-body">
                {parsedTemplate.map((lineSegments, lineIdx) => {
                  return (
                    <div key={lineIdx} className="code-line">
                      <span className="line-number">{lineIdx + 1}</span>
                      <span className="code-content">
                        {lineSegments.map((seg, segIdx) => {
                          if (seg.type === 'text') {
                            return <span key={segIdx}>{seg.value}</span>;
                          } else {
                            const valState = activeProbValidation[seg.inputIdx] || '';
                            let validationClass = '';
                            if (valState === 'correct') validationClass = 'correct';
                            if (valState === 'incorrect') validationClass = 'incorrect';

                            // Dynamic size depending on expected length
                            const width = Math.max(80, seg.expected.length * 9);

                            return (
                              <input 
                                key={segIdx}
                                type="text"
                                className={`skeleton-input ${validationClass}`}
                                style={{ width: `${width}px` }}
                                placeholder="___"
                                value={activeProbInputs[seg.inputIdx] || ""}
                                onChange={(e) => handleInputChange(seg.inputIdx, e.target.value)}
                                disabled={valState === 'correct'}
                              />
                            );
                          }
                        })}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Skeleton Controls */}
            <div className="skeleton-controls">
              <button 
                className={`primary-action-btn ${dayData.patternType}`}
                onClick={handleVerifyAnswers}
              >
                <i className="fa-solid fa-circle-check"></i> Check Code Blanks
              </button>
              
              <button 
                className="secondary-action-btn"
                onClick={handleRevealSolution}
              >
                Reveal Solution
              </button>

              {isActiveProbChecked && (
                <span style={{ fontWeight: '700', fontSize: '14px' }}>
                  {Object.values(activeProbValidation).every(v => v === 'correct') ? (
                    <span style={{ color: 'var(--success)' }}>
                      <i className="fa-solid fa-star"></i> Challenge solved! You recalled this pattern perfectly.
                    </span>
                  ) : (
                    <span style={{ color: 'var(--error)' }}>
                      <i className="fa-solid fa-triangle-exclamation"></i> Some blanks are incorrect. Try again!
                    </span>
                  )}
                </span>
              )}
            </div>

            {/* Complete Day footer */}
            <div className="day-complete-section">
              <div style={{ color: 'var(--text-muted)', fontSize: '13px' }}>
                {!isDayFullyValid() ? "💡 Reconstruct all templates on this page to clear this recall challenge." : "🎉 You have recalled all templates for this day!"}
              </div>
              <button 
                className="day-complete-btn" 
                onClick={onComplete}
                disabled={!isCompleted && !isDayFullyValid()}
              >
                <i className="fa-solid fa-graduation-cap"></i> Mark Day {dayData.id} Complete
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Render React Root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
