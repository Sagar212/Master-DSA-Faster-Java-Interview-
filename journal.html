<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA 6-Day Mastery Study Journal</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="journal.css?v=3">
  <script>
    if (window.location.protocol === 'file:') {
      document.addEventListener("DOMContentLoaded", function() {
        document.body.innerHTML = `
          <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #070913; padding: 20px; color: #f1f5f9; font-family: 'Outfit', sans-serif;">
            <div style="max-width: 500px; width: 100%; padding: 32px; text-align: center; background: rgba(13, 17, 33, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
              <i class="fa-solid fa-triangle-exclamation" style="font-size: 60px; color: #ef4444; margin-bottom: 20px;"></i>
              <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 16px;">CORS / Protocol Restriction</h2>
              <p style="font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px;">
                Browser security rules restrict loading local files and JSON data via the <strong>file://</strong> protocol. 
                You must run this interactive journal using a local web server.
              </p>
              <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; padding: 16px; font-size: 13px; text-align: left; margin-bottom: 24px; line-height: 1.5;">
                <h4 style="color: #ef4444; font-weight: 700; margin-bottom: 6px;">How to run:</h4>
                <ol style="padding-left: 20px; color: #f1f5f9;">
                  <li>Double-click the <strong>serve.bat</strong> file in the project folder to start a local server.</li>
                  <li>Open <a href="http://localhost:8000/journal.html" style="color: #0ea5e9; font-weight: 700; text-decoration: none;">http://localhost:8000/journal.html</a> in your browser.</li>
                </ol>
              </div>
              <button onclick="window.location.reload()" style="background: linear-gradient(135deg, #0ea5e9 0%, #14b8a6 100%); border: none; border-radius: 8px; color: white; padding: 12px 24px; font-weight: 700; font-family: 'Outfit'; cursor: pointer; width: 100%;">
                <i class="fa-solid fa-rotate-right"></i> Retry Connection
              </button>
            </div>
          </div>
        `;
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React Libraries from Unpkg CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    var { useState, useEffect, useRef, useCallback } = React;
    var LEETCODE_MAP = {};
  </script>

  <!-- Main React App Script (JSX Compiled on the Fly sequentially) -->
  <script>
    const journalScripts = [
      'journal/DashboardView.jsx',
      'journal/DayPatternLearn.jsx',
      'journal/DayDryRunAndQuiz.jsx',
      'journal/DayActiveRecall.jsx',
      'journal/JavaBuildingBlocks.jsx',
      'journal.js'
    ];

    async function loadJSX(url) {
      const res = await fetch(`${url}?v=${Date.now()}`);
      if (!res.ok) throw new Error(`Failed to fetch ${url}: ${res.statusText}`);
      const code = await res.text();
      const compiled = Babel.transform(code, { presets: ['react'] }).code;
      
      const script = document.createElement('script');
      script.text = compiled;
      document.body.appendChild(script);
    }

    async function initJournal() {
      try {
        for (const src of journalScripts) {
          await loadJSX(src);
        }
      } catch (err) {
        console.error('Error loading journal scripts:', err);
        document.getElementById('root').innerHTML = `
          <div style="padding: 24px; color: #ef4444; font-family: sans-serif; text-align: center; max-width: 600px; margin: 40px auto; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 12px;">
            <h3 style="margin-bottom: 8px;">Failed to Launch Journal</h3>
            <p style="font-size: 14px; color: #94a3b8;">${err.message}</p>
            <p style="font-size: 12px; color: #ef4444; margin-top: 12px;">Check browser developer console for detailed logs.</p>
          </div>
        `;
      }
    }

    initJournal();
  </script>
</body>
</html>
